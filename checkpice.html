<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>房產比價｜車位拆算＋額外裝潢＋自備款</title>
<style>
:root{
  --bg:#0b0f14; --card:rgba(255,255,255,.06); --stroke:rgba(255,255,255,.12);
  --text:#e9eef5; --muted:#a9b4c0; --accent:#22d3ee; --good:#34d399; --warn:#f59e0b;
}
.light{
  --bg:#f7fafc; --card:#ffffffcc; --stroke:#e6eef6; --text:#0b1520; --muted:#475569; --accent:#0ea5e9; --good:#059669; --warn:#b45309;
}
*{box-sizing:border-box}
body{
  margin:0;font:15px/1.5 system-ui,-apple-system,"PingFang TC","Noto Sans TC",Segoe UI,Roboto;
  background:var(--bg);color:var(--text);
}
header{
  max-width:1400px;margin:24px auto 0;padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap
}
.title{font-weight:700;font-size:20px}
.controls{display:flex;gap:8px;flex-wrap:wrap}
button,select,input{
  background:var(--card);color:var(--text);border:1px solid var(--stroke);
  border-radius:8px;padding:6px 10px;backdrop-filter:blur(10px)
}
button{cursor:pointer}
button.primary{background:linear-gradient(135deg,#22d3ee55,#0ea5e944);border:none}
button.good{background:linear-gradient(135deg,#34d39955,#10b98144);border:none}
button.warn{background:linear-gradient(135deg,#f59e0b55,#fbbf2444);border:none}
main{max-width:1400px;margin:16px auto 80px;padding:0 16px;display:grid;gap:16px}
.grid{
  display:grid;gap:16px;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
}
.card{
  background:var(--card);border:1px solid var(--stroke);border-radius:12px;padding:12px;
  display:flex;flex-direction:column;gap:10px;min-width:0;
}
.badge{font-weight:600;background:var(--accent);color:#fff;padding:4px 8px;border-radius:8px;align-self:flex-start}
.rank1{outline:2px solid var(--good)}
.rank2{outline:2px solid var(--accent)}
.rank3{outline:2px solid var(--warn)}
.row{display:grid;gap:8px;grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.row input{width:100%}
.kpi{display:flex;gap:8px;flex-wrap:wrap;font-size:13px}
.kpi span{padding:4px 8px;border:1px dashed var(--stroke);border-radius:8px}
.note{font-size:12px;color:var(--muted)}
.tableWrap{display:block;overflow-x:auto;width:100%}
table{width:100%;border-collapse:collapse;min-width:1200px}
th,td{padding:6px 10px;white-space:nowrap;border-bottom:1px dashed var(--stroke);text-align:right;min-width:80px}
th:first-child,td:first-child{text-align:left;min-width:120px}
footer{position:fixed;bottom:12px;left:0;right:0;display:flex;justify-content:center}
footer .dock{display:flex;gap:8px;background:var(--card);border:1px solid var(--stroke);padding:8px 10px;border-radius:999px;backdrop-filter:blur(10px);max-width:1400px;margin:0 auto}

/* 手機版響應式設計 */
@media (max-width: 768px) {
  header{
    padding:0 12px;margin:16px auto 0;
    flex-direction:column;align-items:stretch;gap:12px
  }
  .title{font-size:18px;text-align:center}
  .controls{
    justify-content:center;flex-wrap:wrap;gap:6px
  }
  .controls select, .controls button{
    font-size:14px;padding:8px 12px;min-width:auto
  }
  main{
    max-width:100%;margin:12px auto 100px;padding:0 12px;gap:12px
  }
  .grid{
    grid-template-columns:1fr;gap:12px
  }
  .card{
    padding:16px;gap:12px
  }
  .row{
    grid-template-columns:repeat(2,1fr);gap:8px
  }
  .kpi{
    flex-direction:row;flex-wrap:wrap;gap:6px;justify-content:space-between
  }
  .kpi span{
    flex:1;min-width:calc(50% - 3px);text-align:center;padding:6px 8px;font-size:12px
  }
  .tableWrap{
    overflow-x:auto;-webkit-overflow-scrolling:touch
  }
  table{
    min-width:800px;font-size:14px
  }
  th,td{
    padding:8px 6px;min-width:70px
  }
  th:first-child,td:first-child{
    min-width:100px
  }
  footer .dock{
    max-width:calc(100vw - 24px);padding:6px 8px;gap:6px;flex-wrap:wrap
  }
  footer .dock button{
    font-size:12px;padding:6px 10px;min-width:auto;flex:1
  }
}

@media (max-width: 480px) {
  .title{font-size:16px}
  .controls select, .controls button{
    font-size:12px;padding:6px 10px
  }
  .card{
    padding:12px
  }
  .row{
    grid-template-columns:repeat(2,1fr);gap:6px
  }
  .kpi{
    flex-direction:row;flex-wrap:wrap;gap:4px
  }
  .kpi span{
    flex:1;min-width:calc(50% - 2px);font-size:11px;padding:4px 6px
  }
  table{
    min-width:700px;font-size:12px
  }
  th,td{
    padding:6px 4px;min-width:60px
  }
  th:first-child,td:first-child{
    min-width:80px
  }
  footer .dock button{
    font-size:11px;padding:5px 8px
  }
}
</style>
</head>
<body>
<header>
  <div class="title">🏠 房產比價｜車位拆算＋額外裝潢＋自備款</div>
  <div class="controls" style="display:none">
    <select id="cpMode">
      <option value="house" selected>以【房屋(扣車位)單價】為準</option>
      <option value="usable">以【主＋附】單價</option>
      <option value="totalIncl">以【合計坪(含車位)】單價</option>
    </select>
    <button id="toggleTheme">🌗 深/淺</button>
    <button id="saveBtn">💾 儲存</button>
    <button id="loadBtn">📂 載入</button>
    <button id="csvBtn">⬇️ 匯出CSV</button>
  </div>
</header>

<main>
  <section class="grid" id="items"></section>

  <section class="card">
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>物件</th><th>成交價(萬)</th><th>額外裝潢(萬)</th><th>LTV%</th><th>自備款(萬)</th><th>總支出(萬)</th>
            <th>主＋附坪</th><th>車位坪</th><th>合計坪(含車位)</th>
            <th>房屋單價(扣車位)</th><th>主＋附單價</th><th>總單價(含車位)</th><th>排名</th>
          </tr>
        </thead>
        <tbody id="summary"></tbody>
      </table>
    </div>
  </section>
</main>

<footer>
  <div class="dock">
    <button class="primary" id="prefillBtn">一鍵帶入：世紀城/新巴黎/學學</button>
    <button id="addBtn">＋新增物件</button>
    <button class="warn" id="resetBtn">清空</button>
  </div>
</footer>

<script>
const app=document.getElementById('items');
const summary=document.getElementById('summary');
const cpMode=document.getElementById('cpMode');
let rows=[];

/* 建卡片 */
function newRow(d={}){
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="badge">${d.name||'新物件'}</div>
    <div class="row">
      <div><label>名稱</label><input type="text" class="name" value="${d.name||''}"></div>
      <div><label>成交價(萬)</label><input type="number" class="price" value="${d.price||''}"></div>
      <div><label>主＋附坪</label><input type="number" class="usable" value="${d.usable||''}"></div>
      <div><label>車位坪數</label><input type="number" class="parkArea" value="${d.parkArea||0}"></div>
      <div><label>車位價格(萬)</label><input type="number" class="parkPrice" value="${d.parkPrice||0}"></div>
      <div><label>額外裝潢(萬)</label><input type="number" class="extraDecor" value="${d.extraDecor||0}"></div>
      <div><label>貸款成數(%)</label><input type="number" class="ltv" value="${d.ltv||80}"></div>
    </div>
    <div class="kpi">
      <span class="houseP">房屋單價 —</span>
      <span class="usableP">主＋附單價 —</span>
      <span class="totalP">合計單價 —</span>
      <span class="downP">自備款 —</span>
    </div>
    <button class="warn delBtn">刪除</button>
  `;
  app.appendChild(card);

  card.querySelector('.name').addEventListener('input',e=>{
    card.querySelector('.badge').textContent=e.target.value||'新物件';
  });
  card.querySelector('.delBtn').onclick=()=>{card.remove();rows=rows.filter(r=>r.el!==card);calcAll();};
  card.addEventListener('input',calcAll);
  rows.push({el:card});
  calcAll();
}

/* 計算 */
function calcAll(){
  summary.innerHTML='';
  const mode=cpMode.value;
  const data=rows.map(r=>{
    const d={
      name:r.el.querySelector('.name').value,
      price:+r.el.querySelector('.price').value||0,
      usable:+r.el.querySelector('.usable').value||0,
      parkArea:+r.el.querySelector('.parkArea').value||0,
      parkPrice:+r.el.querySelector('.parkPrice').value||0,
      extraDecor:+r.el.querySelector('.extraDecor').value||0,
      ltv:+r.el.querySelector('.ltv').value||80
    };
    d.totalIncl = d.usable + d.parkArea;
    d.houseUnit = d.usable ? ( (d.price - d.parkPrice) / d.usable ) : 0;
    d.usableUnit= d.usable ? ( d.price / d.usable ) : 0;
    d.totalUnit = d.totalIncl ? ( d.price / d.totalIncl ) : 0;
    d.downPayment = d.price * (1 - d.ltv/100) + d.extraDecor;
    d.totalCost = d.price + d.extraDecor;
    d.cp = mode==='house' ? d.houseUnit : (mode==='usable'?d.usableUnit:d.totalUnit);
    return {...d,row:r};
  });

  const ranked=[...data].sort((a,b)=>a.cp-b.cp);
  data.forEach(d=>{
    const rank=ranked.findIndex(x=>x===d)+1;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${d.name||'—'}</td>
      <td>${d.price}</td>
      <td>${d.extraDecor}</td>
      <td>${d.ltv}</td>
      <td>${d.downPayment.toFixed(1)}</td>
      <td>${d.totalCost.toFixed(1)}</td>
      <td>${d.usable}</td>
      <td>${d.parkArea}</td>
      <td>${d.totalIncl}</td>
      <td>${d.houseUnit?d.houseUnit.toFixed(2):'—'}</td>
      <td>${d.usableUnit?d.usableUnit.toFixed(2):'—'}</td>
      <td>${d.totalUnit?d.totalUnit.toFixed(2):'—'}</td>
      <td>${rank}</td>`;
    summary.appendChild(tr);

    d.row.el.classList.remove('rank1','rank2','rank3');
    if(rank<=3)d.row.el.classList.add(`rank${rank}`);
    d.row.el.querySelector('.houseP').textContent=`房屋單價 ${d.houseUnit?d.houseUnit.toFixed(2):'—'}萬/坪`;
    d.row.el.querySelector('.usableP').textContent=`主＋附單價 ${d.usableUnit?d.usableUnit.toFixed(2):'—'}萬/坪`;
    d.row.el.querySelector('.totalP').textContent=`合計單價 ${d.totalUnit?d.totalUnit.toFixed(2):'—'}萬/坪`;
    d.row.el.querySelector('.downP').textContent=`自備款 ${d.downPayment.toFixed(1)}萬`;
  });
}

/* 預設資料 */
function prefill(use970=false){
  rows=[];app.innerHTML='';
  newRow({name:'世紀城2房1車',price:1021,usable:28.31,parkArea:9.58,parkPrice:135,extraDecor:0,ltv:75});
  newRow({name:'新巴黎2房2車',price:1000,usable:29.37,parkArea:8.81,parkPrice:130,extraDecor:50,ltv:75});
  newRow({name:'益新學學2房1車',price:1030,usable:30.46,parkArea:10.88,parkPrice:145,extraDecor:0,ltv:75});
}

/* 互動按鈕 */
document.getElementById('prefillBtn').onclick=()=>prefill(false);
document.getElementById('addBtn').onclick=()=>newRow();
document.getElementById('resetBtn').onclick=()=>{rows=[];app.innerHTML='';summary.innerHTML='';};
cpMode.onchange=calcAll;

document.getElementById('toggleTheme').onclick=()=>{
  document.body.classList.toggle('light');
  localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');
};
document.getElementById('saveBtn').onclick=()=>{
  const arr=rows.map(r=>({
    name:r.el.querySelector('.name').value,
    price:r.el.querySelector('.price').value,
    usable:r.el.querySelector('.usable').value,
    parkArea:r.el.querySelector('.parkArea').value,
    parkPrice:r.el.querySelector('.parkPrice').value,
    extraDecor:r.el.querySelector('.extraDecor').value,
    ltv:r.el.querySelector('.ltv').value
  }));
  localStorage.setItem('compare-data',JSON.stringify(arr));
  alert('已儲存');
};
document.getElementById('loadBtn').onclick=()=>{
  const raw=localStorage.getItem('compare-data');
  if(!raw){alert('無資料');return;}
  rows=[];app.innerHTML='';
  JSON.parse(raw).forEach(d=>newRow(d));
};
document.getElementById('csvBtn').onclick=()=>{
  let csv='物件,成交價,額外裝潢,LTV%,自備款,總支出,主＋附坪,車位坪,合計坪(含車位),房屋單價(扣車位),主＋附單價,總單價(含車位)\n';
  rows.forEach(r=>{
    const d={
      name:r.el.querySelector('.name').value,
      price:+r.el.querySelector('.price').value||0,
      usable:+r.el.querySelector('.usable').value||0,
      parkArea:+r.el.querySelector('.parkArea').value||0,
      parkPrice:+r.el.querySelector('.parkPrice').value||0,
      extraDecor:+r.el.querySelector('.extraDecor').value||0,
      ltv:+r.el.querySelector('.ltv').value||80
    };
    const totalIncl=d.usable+d.parkArea;
    const houseUnit=d.usable?((d.price-d.parkPrice)/d.usable):0;
    const usableUnit=d.usable?(d.price/d.usable):0;
    const totalUnit=totalIncl?(d.price/totalIncl):0;
    const down=d.price*(1-d.ltv/100)+d.extraDecor;
    const totalCost=d.price+d.extraDecor;
    csv+=`${d.name},${d.price},${d.extraDecor},${d.ltv},${down.toFixed(1)},${totalCost.toFixed(1)},${d.usable},${d.parkArea},${totalIncl},${houseUnit.toFixed(2)},${usableUnit.toFixed(2)},${totalUnit.toFixed(2)}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='compare.csv';a.click();URL.revokeObjectURL(url);
};

/* 初始化 */
if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
prefill(false);
</script>
</body>
</html>
